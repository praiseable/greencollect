services:
  db:
    image: postgis/postgis:15-3.3
    restart: always
    environment:
      POSTGRES_DB: greencollect
      POSTGRES_USER: gcadmin
      POSTGRES_PASSWORD: GC_Str0ng_Passw0rd_2026!
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gcadmin -d greencollect"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass GC_Redis_Pass_2026!
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "GC_Redis_Pass_2026!", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://gcadmin:GC_Str0ng_Passw0rd_2026!@db:5432/greencollect
      REDIS_URL: redis://:GC_Redis_Pass_2026!@redis:6379
      JWT_SECRET: gc_jwt_prod_s3cr3t_k3y_2026_x7m9q
      JWT_REFRESH_SECRET: gc_jwt_refresh_pr0d_k3y_2026_r4n8p
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      DEFAULT_COUNTRY: PK
      DEFAULT_CURRENCY: PKR
      DEFAULT_LANGUAGE: ur
      DEFAULT_TIMEZONE: Asia/Karachi
      DEFAULT_PHONE_CODE: "+92"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web-client:
    build: ./apps/web-client
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - backend

  web-admin:
    build: ./apps/web-admin
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  certbot-webroot:
  certbot-certs:
