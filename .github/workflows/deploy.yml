name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy GreenCollect
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            DOMAIN="gc.directconnect.services"
            EMAIL="admin@directconnect.services"

            echo "========================================="
            echo " GreenCollect — Auto Deploy"
            echo " Triggered by: ${{ github.actor }}"
            echo " Commit: ${{ github.sha }}"
            echo "========================================="

            APP_DIR=~/gc-app

            # 1. Clone if first time
            if [ ! -d "$APP_DIR" ]; then
              echo "First deploy — cloning repo..."
              git clone git@github.com:praiseable/greencollect.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            # 2. Pull latest code
            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # 3. Stop conflicting host services
            sudo systemctl stop nginx 2>/dev/null || true
            sudo systemctl stop apache2 2>/dev/null || true
            sudo systemctl stop postgresql 2>/dev/null || true

            # 4. Check if SSL certs already exist
            CERTS_EXIST=false
            if docker volume inspect gc-app_certbot-certs &>/dev/null; then
              if docker run --rm -v gc-app_certbot-certs:/etc/letsencrypt alpine \
                test -f /etc/letsencrypt/live/${DOMAIN}/fullchain.pem 2>/dev/null; then
                CERTS_EXIST=true
                echo "SSL certificates already exist for ${DOMAIN}"
              fi
            fi

            # 5. Build and deploy
            echo "Building and starting containers..."
            docker compose -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up -d --build || true

            # Verify containers are actually running
            sleep 8
            RUNNING=$(docker compose -f docker-compose.prod.yml ps --status running -q 2>/dev/null | wc -l)
            if [ "$RUNNING" -lt 4 ]; then
              echo "ERROR: Only $RUNNING containers running (expected 5). Deployment failed."
              docker compose -f docker-compose.prod.yml ps
              docker compose -f docker-compose.prod.yml logs --tail 30
              exit 1
            fi
            echo "All $RUNNING containers are running."

            # 6. SSL Certificate handling
            if [ "$CERTS_EXIST" = false ]; then
              echo "No SSL certificate. Obtaining from Let's Encrypt..."
              sleep 5
              docker run --rm \
                -v gc-app_certbot-webroot:/var/www/certbot \
                -v gc-app_certbot-certs:/etc/letsencrypt \
                certbot/certbot certonly \
                --webroot \
                --webroot-path=/var/www/certbot \
                --email ${EMAIL} \
                --agree-tos \
                --no-eff-email \
                -d ${DOMAIN} && CERTS_EXIST=true || echo "WARNING: Failed to obtain SSL certificate"

              if [ "$CERTS_EXIST" = true ]; then
                echo "SSL certificate obtained! Restarting web portal..."
                docker compose -f docker-compose.prod.yml restart web-portal
                sleep 3
              fi
            else
              echo "Checking if SSL certificate needs renewal..."
              RENEW_OUTPUT=$(docker run --rm \
                -v gc-app_certbot-webroot:/var/www/certbot \
                -v gc-app_certbot-certs:/etc/letsencrypt \
                certbot/certbot renew \
                --webroot \
                --webroot-path=/var/www/certbot \
                --dry-run 2>&1) || true

              if echo "$RENEW_OUTPUT" | grep -q "would be renewed"; then
                echo "Certificate expiring soon. Renewing..."
                docker run --rm \
                  -v gc-app_certbot-webroot:/var/www/certbot \
                  -v gc-app_certbot-certs:/etc/letsencrypt \
                  certbot/certbot renew \
                  --webroot \
                  --webroot-path=/var/www/certbot
                docker compose -f docker-compose.prod.yml restart web-portal
                sleep 3
                echo "Certificate renewed!"
              else
                echo "Certificate is still valid. No renewal needed."
              fi
            fi

            # 7. Wait for database
            echo "Waiting for database..."
            RETRIES=40
            until docker compose -f docker-compose.prod.yml exec -T db pg_isready -U gcadmin -d greencollect 2>/dev/null; do
              RETRIES=$((RETRIES - 1))
              if [ $RETRIES -le 0 ]; then
                echo "ERROR: Database did not become ready"
                docker compose -f docker-compose.prod.yml logs db
                exit 1
              fi
              echo "  Waiting... ($RETRIES attempts left)"
              sleep 3
            done
            echo "Database is ready!"

            sleep 5

            # 8. Run migrations
            echo "Running migrations..."
            docker compose -f docker-compose.prod.yml exec -T mobile-backend node migrations/run.js || {
              echo "ERROR: Migrations failed!"
              exit 1
            }
            echo "Migrations complete."

            # 9. Seed data
            echo "Running seeds..."
            docker compose -f docker-compose.prod.yml exec -T mobile-backend node seeds/run.js || {
              echo "ERROR: Seeding failed!"
              exit 1
            }
            echo "Seeding complete."

            # 10. Health checks
            sleep 3
            MOBILE_HEALTH=$(curl -sf http://localhost:3000/health 2>/dev/null || echo "FAILED")
            WEB_HEALTH=$(curl -sf http://localhost:3001/health 2>/dev/null || echo "FAILED")
            PORTAL_HTTP=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:80 2>/dev/null || echo "000")
            PORTAL_HTTPS=$(curl -sf -k -o /dev/null -w "%{http_code}" https://localhost:443 2>/dev/null || echo "000")

            echo ""
            echo "========================================="
            echo " DEPLOYMENT COMPLETE"
            echo "========================================="
            echo " Mobile Backend: $MOBILE_HEALTH"
            echo " Web Backend:    $WEB_HEALTH"
            echo " Web Portal HTTP:  $PORTAL_HTTP"
            echo " Web Portal HTTPS: $PORTAL_HTTPS"
            echo " SSL: $( [ "$CERTS_EXIST" = true ] && echo 'Active' || echo 'Not configured' )"
            echo ""
            docker compose -f docker-compose.prod.yml ps

            echo "========================================="

            # 11. Fail if critical services are down
            if echo "$MOBILE_HEALTH" | grep -q "FAILED"; then
              echo "ERROR: Mobile backend health check failed!"
              docker compose -f docker-compose.prod.yml logs mobile-backend --tail 30
              exit 1
            fi
            if echo "$WEB_HEALTH" | grep -q "FAILED"; then
              echo "ERROR: Web backend health check failed!"
              docker compose -f docker-compose.prod.yml logs web-backend --tail 30
              exit 1
            fi
            if [ "$PORTAL_HTTP" = "000" ]; then
              echo "ERROR: Web portal is not responding!"
              docker compose -f docker-compose.prod.yml logs web-portal --tail 30
              exit 1
            fi

            echo "All services are healthy!"
