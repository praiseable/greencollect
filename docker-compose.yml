services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: kabariya
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d kabariya"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API Gateway (entry point)
  gateway:
    build: ./services/gateway
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      AUTH_SERVICE_URL: http://auth-service:5000
      ADMIN_SERVICE_URL: http://admin-service:5001
      CUSTOMER_SERVICE_URL: http://customer-service:5002
      JWT_SECRET: dev-jwt-secret-change-in-production
      INTERNAL_SERVICE_SECRET: internal-service-secret-change-in-production
      CORS_ORIGIN: "*"
    depends_on:
      - auth-service
      - admin-service
      - customer-service

  # Auth Service
  auth-service:
    build: ./services/auth-service
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://admin:secret@db:5432/kabariya
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-jwt-refresh-secret-change-in-production
      INTERNAL_SERVICE_SECRET: internal-service-secret-change-in-production
      NODE_ENV: development
      CORS_ORIGIN: "*"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Admin Service
  admin-service:
    build: ./services/admin-service
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      DATABASE_URL: postgresql://admin:secret@db:5432/kabariya
      INTERNAL_SERVICE_SECRET: internal-service-secret-change-in-production
      NODE_ENV: development
      CORS_ORIGIN: "*"
    depends_on:
      db:
        condition: service_healthy

  # Customer Service
  customer-service:
    build: ./services/customer-service
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
      DATABASE_URL: postgresql://admin:secret@db:5432/kabariya
      INTERNAL_SERVICE_SECRET: internal-service-secret-change-in-production
      NODE_ENV: development
      CORS_ORIGIN: "*"
    depends_on:
      db:
        condition: service_healthy

  # Legacy backend (kept for backward compatibility during migration)
  backend:
    build: ./backend
    ports:
      - "4001:4000"
    environment:
      DATABASE_URL: postgresql://admin:secret@db:5432/kabariya
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-jwt-refresh-secret-change-in-production
      NODE_ENV: development
      PORT: 4000
      DEFAULT_COUNTRY: PK
      DEFAULT_CURRENCY: PKR
      DEFAULT_LANGUAGE: ur
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web-admin:
    build: ./apps/web-admin
    ports:
      - "3002:80"
    depends_on:
      - gateway

  web-client:
    build: ./apps/web-client
    ports:
      - "3003:80"
    depends_on:
      - gateway

volumes:
  pgdata:
