services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: greencollect
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d greencollect"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://admin:secret@db:5432/greencollect
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-jwt-refresh-secret-change-in-production
      NODE_ENV: development
      PORT: 4000
      DEFAULT_COUNTRY: PK
      DEFAULT_CURRENCY: PKR
      DEFAULT_LANGUAGE: ur
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web-admin:
    build: ./apps/web-admin
    ports:
      - "3002:80"
    depends_on:
      - backend

  web-client:
    build: ./apps/web-client
    ports:
      - "3003:80"
    depends_on:
      - backend

volumes:
  pgdata:
