name: greencollect
description: Pakistan's leading marketplace for recyclable & reusable goods.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  go_router: ^14.2.0
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.7.0
  intl: ^0.19.0
  socket_io_client: ^2.0.3+1
  flutter_local_notifications: ^17.2.1
  url_launcher: ^6.3.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf
        - asset: assets/fonts/NotoNastaliqUrdu-Bold.ttf
          weight: 700
